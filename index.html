<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JonilsonTrader">
<title>JonilsonTrader · Carteira Inter</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#060a0f;--bg1:#0b1017;--bg2:#101820;--bg3:#162030;
  --border:#1e2d3d;--border2:#243547;
  --text:#e8f0fe;--text2:#7b8fa8;--text3:#3d5166;
  --green:#00d68f;--green2:#00d68f22;
  --red:#ff4d6d;--red2:#ff4d6d22;
  --blue:#4a9eff;--blue2:#4a9eff18;
  --orange:#f59e0b;--orange2:#f59e0b18;
  --purple:#8b5cf6;--purple2:#8b5cf618;
  --cyan:#06d6f0;
  --font:'Space Grotesk',sans-serif;--mono:'Space Mono',monospace;--r:10px;
}
html{background:var(--bg0);color:var(--text);font-family:var(--font);font-size:14px}
body{min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:80px;overflow-x:hidden}

/* TICKER */
.ticker-wrap{background:var(--bg1);border-bottom:1px solid var(--border);overflow:hidden;height:30px;display:flex;align-items:center}
.ticker-track{display:flex;white-space:nowrap;animation:ticker 35s linear infinite}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tick-item{padding:0 16px;font-size:10px;font-family:var(--mono);display:flex;align-items:center;gap:6px;border-right:1px solid var(--border)}
.tick-name{color:var(--text2)}.tick-price{color:var(--text);font-weight:700}
.tick-chg.pos{color:var(--green)}.tick-chg.neg{color:var(--red)}

/* HEADER */
.hdr{background:rgba(6,10,15,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px 10px;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.brand{display:flex;align-items:center;gap:8px}
.brand-logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#1a56db,#06d6f0);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;box-shadow:0 0 12px #1a56db55}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.brand-sub{font-size:9px;color:var(--text3);font-family:var(--mono);letter-spacing:.08em;margin-top:1px}
.live-pill{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-family:var(--mono);padding:4px 10px;border-radius:6px;background:var(--green2);color:var(--green);border:1px solid #00d68f33}
.live-dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 4px currentColor}50%{opacity:.2;box-shadow:none}}

/* BODY */
.body{padding:0 12px}

/* HERO */
.hero{margin:14px 0 12px;background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border2);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,#1a56db18,transparent 70%)}
.hero-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);margin-bottom:6px}
.hero-val{font-size:34px;font-weight:700;letter-spacing:-1px;font-family:var(--mono);display:flex;align-items:baseline;gap:4px}
.hero-val .hero-currency{font-size:18px;color:var(--text2);font-weight:500}
.hero-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.hero-pct{font-size:12px;padding:3px 8px;border-radius:6px;font-family:var(--mono);font-weight:700}
.hero-pct.pos{background:var(--green2);color:var(--green);border:1px solid #00d68f33}
.hero-pct.neg{background:var(--red2);color:var(--red);border:1px solid #ff4d6d33}
.hero-sub{font-size:11px;color:var(--text3);font-family:var(--mono)}
.hero-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border-radius:10px;overflow:hidden;margin-top:14px}
.hstat{background:var(--bg2);padding:10px 12px;text-align:center}
.hstat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-family:var(--mono)}
.hstat-v{font-size:13px;font-weight:600;font-family:var(--mono)}

/* MINI CARDS */
.mini-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;position:relative;overflow:hidden}
.mc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.mc.green::after{background:linear-gradient(90deg,var(--green),transparent)}
.mc.red::after{background:linear-gradient(90deg,var(--red),transparent)}
.mc.blue::after{background:linear-gradient(90deg,var(--blue),transparent)}
.mc.purple::after{background:linear-gradient(90deg,var(--purple),transparent)}
.mc-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);margin-bottom:6px}
.mc-val{font-size:17px;font-weight:700;font-family:var(--mono);letter-spacing:-.5px}
.mc-sub{font-size:10px;margin-top:3px;font-family:var(--mono)}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--text2)}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.cbox{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.cbox-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cbox-title{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono)}
.cbox-badge{font-size:8px;padding:2px 6px;border-radius:4px;font-family:var(--mono)}
.cwrap{position:relative;height:120px}
.leg{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.li{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--text2);font-family:var(--mono)}
.ld{width:6px;height:6px;border-radius:2px}

/* SECTION */
.sec{margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.sec-tag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:var(--mono);padding:3px 8px;border-radius:5px}
.sec-tag.cripto{background:var(--purple2);color:var(--purple);border:1px solid #8b5cf633}
.sec-tag.rv{background:var(--blue2);color:var(--blue);border:1px solid #4a9eff33}
.sec-line{flex:1;height:1px;background:var(--border)}
.sec-count{font-size:9px;color:var(--text3);font-family:var(--mono)}

/* ADD BTN */
.add-btn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:11px;border-radius:var(--r);border:1px dashed var(--border2);
  background:transparent;color:var(--text3);font-size:12px;font-family:var(--font);
  cursor:pointer;margin-top:8px;transition:all .2s;font-weight:500;
}
.add-btn:hover{background:var(--bg2);color:var(--text2);border-color:var(--blue)}
.add-btn span{font-size:18px;line-height:1}

/* ASSET ROW */
.asset-list{display:flex;flex-direction:column;gap:6px}
.arow{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .15s}
.arow:hover{border-color:var(--border2)}
.arow-main{display:grid;grid-template-columns:auto 1fr auto auto;gap:8px;align-items:center;padding:11px 12px}
.arow-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;font-family:var(--mono);cursor:pointer}
.arow-center{cursor:pointer}
.arow-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.arow-meta{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:2px;display:flex;align-items:center;gap:6px}
.chg-badge{font-size:9px;padding:1px 5px;border-radius:4px;font-family:var(--mono);font-weight:700}
.chg-pos{background:var(--green2);color:var(--green)}.chg-neg{background:var(--red2);color:var(--red)}
.arow-right{text-align:right;cursor:pointer}
.arow-saldo{font-size:13px;font-weight:700;font-family:var(--mono)}
.arow-rend{font-size:10px;margin-top:2px;font-family:var(--mono)}
.del-btn{width:30px;height:30px;border-radius:8px;background:var(--red2);border:1px solid #ff4d6d33;color:var(--red);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.del-btn:hover{background:#ff4d6d44}
.arow-detail{display:none;background:var(--bg1);border-top:1px solid var(--border);padding:12px 14px}
.arow-detail.open{display:block}
.drow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.drow:last-child{border-bottom:none}
.drow span:first-child{font-size:10px;color:var(--text3);font-family:var(--mono)}
.drow span:last-child{font-size:11px;font-family:var(--mono);font-weight:600}
.pill{font-size:8px;padding:2px 6px;border-radius:4px;font-weight:700;letter-spacing:.04em;font-family:var(--mono)}
.p-fii{background:var(--blue2);color:var(--blue);border:1px solid #4a9eff33}
.p-etf{background:var(--orange2);color:var(--orange);border:1px solid #f59e0b33}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg1);border:1px solid var(--border2);border-radius:18px 18px 0 0;width:100%;max-width:480px;padding:20px 20px 40px;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.modal-close{width:30px;height:30px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.field{margin-bottom:14px}
.field label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);display:block;margin-bottom:6px}
.field input,.field select{
  width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;
  padding:11px 14px;font-size:13px;font-family:var(--mono);color:var(--text);
  outline:none;transition:border-color .2s;
  -webkit-appearance:none;appearance:none;
}
.field input:focus,.field select:focus{border-color:var(--blue)}
.field select option{background:var(--bg2)}
.fields-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-submit{
  width:100%;padding:13px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#1a56db,#06d6f0);
  color:#fff;font-size:14px;font-weight:700;font-family:var(--font);
  cursor:pointer;letter-spacing:.02em;margin-top:6px;
  box-shadow:0 0 20px #1a56db44;transition:opacity .15s;
}
.modal-submit:hover{opacity:.9}
.modal-err{font-size:11px;color:var(--red);font-family:var(--mono);margin-top:8px;display:none;text-align:center}

/* CONFIRM MODAL */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .2s}
.confirm-overlay.open{opacity:1;pointer-events:all}
.confirm-box{background:var(--bg2);border:1px solid var(--red);border-radius:14px;padding:24px 20px;width:100%;max-width:320px;text-align:center;transform:scale(.9);transition:transform .2s}
.confirm-overlay.open .confirm-box{transform:scale(1)}
.confirm-icon{font-size:32px;margin-bottom:10px}
.confirm-title{font-size:15px;font-weight:700;margin-bottom:6px}
.confirm-sub{font-size:12px;color:var(--text2);font-family:var(--mono);margin-bottom:18px}
.confirm-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cbtn{padding:11px;border-radius:8px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;border:none;transition:opacity .15s}
.cbtn:hover{opacity:.85}
.cbtn-cancel{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
.cbtn-confirm{background:var(--red);color:#fff}

/* TOAST */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:400;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:10px 18px;font-size:12px;font-family:var(--mono);color:var(--text);white-space:nowrap;opacity:0;transition:all .3s;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}

/* BOTTOM */
.bottom{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:rgba(6,10,15,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 16px 18px;display:flex;justify-content:space-between;align-items:center;z-index:100}
.upd{font-size:9px;color:var(--text3);font-family:var(--mono);line-height:1.6}
.upd strong{color:var(--text2);display:block}
.rbtn{font-size:11px;font-weight:700;font-family:var(--font);background:linear-gradient(135deg,#1a56db,#06d6f0);color:#fff;border:none;border-radius:8px;padding:9px 18px;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 0 16px #1a56db44;transition:opacity .15s,transform .1s}
.rbtn:active{opacity:.8;transform:scale(.96)}.rbtn:disabled{opacity:.4}
.spin{animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.err-bar{background:var(--red2);border:1px solid #ff4d6d33;border-radius:var(--r);padding:8px 12px;font-size:10px;color:var(--red);margin-bottom:10px;display:none;font-family:var(--mono)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg0)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
