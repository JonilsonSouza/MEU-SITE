<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Carteira · Jonilson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f;
    --bg2: #181818;
    --bg3: #222222;
    --border: #2a2a2a;
    --text: #f0ede8;
    --text2: #888;
    --text3: #555;
    --orange: #E8722A;
    --green: #2ecc8a;
    --red: #e05555;
    --blue: #4a9eff;
    --purple: #9b87f5;
    --radius: 14px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  html, body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
  body { padding: 0 0 80px; max-width: 480px; margin: 0 auto; }

  /* HEADER */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,15,15,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .header-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
  .live-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 500;
    padding: 4px 10px; border-radius: 20px;
    background: #2ecc8a18; color: var(--green);
    border: 1px solid #2ecc8a33;
  }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* BODY */
  .body { padding: 0 16px; }

  /* SUMMARY CARDS */
  .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
  .scard {
    background: var(--bg2); border-radius: var(--radius); padding: 14px 16px;
    border: 1px solid var(--border);
    transition: transform .15s;
  }
  .scard:active { transform: scale(.97); }
  .scard-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .scard-val { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; font-family: var(--mono); color: var(--text); }
  .scard-val.big { font-size: 22px; }
  .scard-sub { font-size: 11px; margin-top: 4px; font-family: var(--mono); }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neu { color: var(--text2); }

  /* CHART AREA */
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .ccard {
    background: var(--bg2); border-radius: var(--radius); padding: 14px;
    border: 1px solid var(--border);
  }
  .ccard-title { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .cwrap { position: relative; height: 130px; }
  .leg { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .li { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text2); }
  .ld { width: 7px; height: 7px; border-radius: 2px; }

  /* SECTION */
  .sec-hdr {
    font-size: 10px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: .08em;
    display: flex; align-items: center; gap: 8px;
    margin: 20px 0 10px;
  }
  .sec-hdr::after { content:''; flex:1; height:1px; background: var(--border); }

  /* ASSET CARDS */
  .acard {
    background: var(--bg2); border-radius: var(--radius);
    border: 1px solid var(--border); margin-bottom: 8px; overflow: hidden;
  }
  .acard-main { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; cursor: pointer; }
  .acard-left { display: flex; align-items: center; gap: 10px; }
  .aicon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .acard-name { font-size: 14px; font-weight: 600; }
  .acard-qtd { font-size: 10px; color: var(--text2); font-family: var(--mono); margin-top: 2px; }
  .acard-right { text-align: right; }
  .acard-saldo { font-size: 14px; font-weight: 600; font-family: var(--mono); }
  .acard-rend { font-size: 11px; margin-top: 2px; font-family: var(--mono); }
  .acard-detail {
    display: none; background: var(--bg3);
    border-top: 1px solid var(--border); padding: 12px 16px;
    font-size: 12px;
  }
  .acard-detail.open { display: block; }
  .detail-row { display: flex; justify-content: space-between; padding: 4px 0; }
  .detail-row span:first-child { color: var(--text2); }
  .detail-row span:last-child { font-family: var(--mono); font-weight: 500; }
  .change-badge {
    font-size: 10px; padding: 2px 6px; border-radius: 6px;
    font-family: var(--mono); font-weight: 500;
    display: inline-flex; align-items: center; gap: 2px;
  }
  .change-pos { background: #2ecc8a18; color: var(--green); }
  .change-neg { background: #e0555518; color: var(--red); }
  .pill { font-size: 9px; padding: 2px 6px; border-radius: 6px; font-weight: 600; letter-spacing: .04em; }
  .p-fii { background: #4a9eff18; color: var(--blue); border: 1px solid #4a9eff33; }
  .p-etf { background: #f5a62318; color: #f5a623; border: 1px solid #f5a62333; }

  /* BOTTOM BAR */
  .bottom {
    position: fixed; bottom: 0; left: 0; right: 0;
    max-width: 480px; margin: 0 auto;
    background: rgba(15,15,15,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 10px 20px 20px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .upd-txt { font-size: 10px; color: var(--text3); font-family: var(--mono); }
  .refresh-btn {
    font-size: 12px; font-weight: 500; font-family: var(--font);
    background: var(--orange); color: #fff;
    border: none; border-radius: 10px;
    padding: 8px 16px; cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: opacity .15s, transform .1s;
  }
  .refresh-btn:active { opacity: .8; transform: scale(.96); }
  .refresh-btn:disabled { opacity: .5; }

  /* ERR */
  .err { background: #e0555518; border: 1px solid #e0555533; border-radius: 10px; padding: 8px 12px; font-size: 11px; color: var(--red); margin-bottom: 12px; display: none; }

  /* SPINNER */
  .spin { animation: spin .7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* LOADING SKELETON */
  .skel { background: linear-gradient(90deg,var(--bg2),var(--bg3),var(--bg2)); background-size: 200%; animation: skel 1.2s infinite; border-radius: 6px; height: 14px; }
  @keyframes skel { 0%{background-position:200%} 100%{background-position:-200%} }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">Carteira Inter</div>
      <div class="header-sub" id="hdr-sub">Jonilson · Goiânia</div>
    </div>
    <div class="live-badge"><span class="live-dot"></span><span id="live-txt">ao vivo</span></div>
  </div>
</div>

<div class="body">
  <div class="err" id="err-box">⚠ Não foi possível buscar preços ao vivo. Exibindo última cotação salva.</div>

  <div class="summary">
    <div class="scard" style="grid-column:1/-1">
      <div class="scard-label">Patrimônio total</div>
      <div class="scard-val big" id="v-patrimonio">R$ —</div>
      <div class="scard-sub neu" id="v-patrimonio-sub">8 ativos</div>
    </div>
    <div class="scard">
      <div class="scard-label">Total investido</div>
      <div class="scard-val" id="v-investido">R$ —</div>
      <div class="scard-sub neu">custo médio</div>
    </div>
    <div class="scard">
      <div class="scard-label">Resultado</div>
      <div class="scard-val" id="v-resultado">R$ —</div>
      <div class="scard-sub" id="v-pct">—</div>
    </div>
    <div class="scard">
      <div class="scard-label">Melhor hoje</div>
      <div class="scard-val" id="v-best" style="font-size:16px">—</div>
      <div class="scard-sub pos" id="v-best-pct">—</div>
    </div>
    <div class="scard">
      <div class="scard-label">Pior hoje</div>
      <div class="scard-val" id="v-worst" style="font-size:16px">—</div>
      <div class="scard-sub neg" id="v-worst-pct">—</div>
    </div>
  </div>

  <div class="charts">
    <div class="ccard">
      <div class="ccard-title">Distribuição</div>
      <div class="cwrap"><canvas id="cDist"></canvas></div>
      <div class="leg" id="legDist"></div>
    </div>
    <div class="ccard">
      <div class="ccard-title">Resultado</div>
      <div class="cwrap"><canvas id="cBar"></canvas></div>
    </div>
  </div>

  <div class="sec-hdr">Cripto</div>
  <div id="list-cripto"></div>

  <div class="sec-hdr">Renda Variável</div>
  <div id="list-rv"></div>
</div>

<div class="bottom">
  <div class="upd-txt" id="upd-txt">Atualizando...</div>
  <button class="refresh-btn" id="rbtn" onclick="fetchAll()">
    <span id="rbtn-icon">↻</span> Atualizar
  </button>
</div>

<script>
// ── CARTEIRA ───────────────────────────────────────────────────
const CRIPTO = [
  { nome:'HYPE',  id:'hyperliquid',      qtd:0.23727,   custo:68.18,  cor:'#9b87f5' },
  { nome:'ARB',   id:'arbitrum',         qtd:58.99192,  custo:39.40,  cor:'#E8722A' },
  { nome:'OP',    id:'optimism',         qtd:39.98194,  custo:29.55,  cor:'#e05555' },
  { nome:'HBAR',  id:'hedera-hashgraph', qtd:41.71381,  custo:19.70,  cor:'#4a9eff' },
  { nome:'GALA',  id:'gala',             qtd:536.905,   custo:9.85,   cor:'#2ecc8a' },
];
const RV = [
  { nome:'ALZR11', tipo:'FII', qtd:14, custo:148.12, cor:'#4a9eff',  snap:10.46 },
  { nome:'CPLG11', tipo:'FII', qtd:4,  custo:45.60,  cor:'#2ecc8a',  snap:11.16 },
  { nome:'BITI11', tipo:'ETF', qtd:3,  custo:107.73, cor:'#f5a623',  snap:34.97 },
];

let precos = {};
let distChart = null, barChart = null;
let openCard = null;

// ── UTILS ──────────────────────────────────────────────────────
const R = v => 'R$ ' + Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const P = (r,c) => c>0 ? ((r/c)*100) : 0;
const Ps = (r,c) => { const p=P(r,c); return (p>=0?'+':'')+p.toFixed(2).replace('.',',')+'%'; };

// ── FETCH CRIPTO ───────────────────────────────────────────────
async function fetchCripto() {
  const ids = CRIPTO.map(a=>a.id).join(',');
  const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=brl&include_24hr_change=true`,
    { signal: AbortSignal.timeout(8000) });
  if (!res.ok) throw new Error('coingecko');
  const data = await res.json();
  CRIPTO.forEach(a => {
    if (data[a.id]) precos[a.nome] = { p: data[a.id].brl, c: data[a.id].brl_24h_change||0 };
  });
}

// ── FETCH RV ───────────────────────────────────────────────────
async function fetchRV() {
  const syms = RV.map(a=>a.nome+'.SA').join(',');
  try {
    const res = await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${syms}`,
      { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    (data?.quoteResponse?.result||[]).forEach(q => {
      const n = q.symbol.replace('.SA','');
      precos[n] = { p: q.regularMarketPrice, c: q.regularMarketChangePercent||0 };
    });
  } catch {
    RV.forEach(a => { if(!precos[a.nome]) precos[a.nome] = { p: a.snap, c: 0 }; });
  }
}

// ── RENDER CARDS SUMMARY ───────────────────────────────────────
function renderSummary(todos) {
  const totalInv  = todos.reduce((s,a)=>s+a.custo,0);
  const totalSaldo= todos.reduce((s,a)=>s+a.saldo,0);
  const rend      = totalSaldo - totalInv;
  const pct       = P(rend,totalInv);

  document.getElementById('v-patrimonio').textContent = R(totalSaldo);
  document.getElementById('v-patrimonio-sub').textContent = todos.length+' ativos';
  document.getElementById('v-investido').textContent = R(totalInv);
  document.getElementById('v-resultado').textContent = (rend>=0?'+':'-')+R(rend);
  document.getElementById('v-resultado').className = 'scard-val '+(rend>=0?'pos':'neg');
  const pEl = document.getElementById('v-pct');
  pEl.textContent = (pct>=0?'+':'')+pct.toFixed(2).replace('.',',')+'%';
  pEl.className = 'scard-sub '+(pct>=0?'pos':'neg');

  const sorted = [...todos].sort((a,b)=>b.change24h-a.change24h);
  const best = sorted[0], worst = sorted[sorted.length-1];
  document.getElementById('v-best').textContent = best.nome;
  document.getElementById('v-best-pct').textContent = (best.change24h>=0?'+':'')+best.change24h.toFixed(2).replace('.',',')+'%';
  document.getElementById('v-worst').textContent = worst.nome;
  document.getElementById('v-worst-pct').textContent = worst.change24h.toFixed(2).replace('.',',')+'%';
}

// ── RENDER CHARTS ──────────────────────────────────────────────
function renderCharts(todos) {
  const grupos = {};
  todos.forEach(a => { grupos[a.tipo]=(grupos[a.tipo]||0)+a.saldo; });
  const total = Object.values(grupos).reduce((s,v)=>s+v,0);
  const dL = Object.keys(grupos), dD = Object.values(grupos);
  const dC = { Cripto:'#9b87f5', FII:'#4a9eff', ETF:'#f5a623' };

  document.getElementById('legDist').innerHTML = dL.map(l=>
    `<span class="li"><span class="ld" style="background:${dC[l]}"></span>${l} ${total>0?((grupos[l]/total)*100).toFixed(0):0}%</span>`
  ).join('');

  if(distChart) distChart.destroy();
  distChart = new Chart(document.getElementById('cDist'),{
    type:'doughnut',
    data:{ labels:dL, datasets:[{data:dD, backgroundColor:dL.map(l=>dC[l]), borderWidth:0, hoverOffset:4}] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'70%',
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:ctx=>' '+R(ctx.parsed) }}}}
  });

  const bNomes = todos.map(a=>a.nome);
  const bRend  = todos.map(a=>parseFloat(a.rend.toFixed(2)));
  const bCores = bRend.map(v=>v>=0?'#2ecc8a55':'#e0555555');
  const bBorder= bRend.map(v=>v>=0?'#2ecc8a':'#e05555');

  if(barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('cBar'),{
    type:'bar',
    data:{ labels:bNomes, datasets:[{data:bRend, backgroundColor:bCores, borderColor:bBorder, borderWidth:1}] },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:ctx=>(ctx.parsed.x>=0?'+':'')+R(ctx.parsed.x) }}},
      scales:{
        x:{ grid:{color:'#2a2a2a'}, ticks:{color:'#555',font:{size:8}, callback:v=>(v>=0?'+':'')+v.toFixed(0)} },
        y:{ grid:{display:false}, ticks:{color:'#888',font:{size:9}} }
      }
    }
  });
}

// ── RENDER ASSET LIST ──────────────────────────────────────────
function renderList(ativos, containerId) {
  const el = document.getElementById(containerId);
  el.innerHTML = ativos.map((a,i) => {
    const r = a.rend;
    const pct = Ps(r, a.custo);
    const cc = a.change24h>=0?'change-pos':'change-neg';
    const cs = (a.change24h>=0?'▲ +':'▼ ')+Math.abs(a.change24h).toFixed(2).replace('.',',')+'%';
    const pillHtml = a.tipo && a.tipo!=='Cripto'
      ? `<span class="pill ${a.tipo==='FII'?'p-fii':'p-etf'}">${a.tipo}</span> ` : '';
    return `<div class="acard" id="ac-${containerId}-${i}">
      <div class="acard-main" onclick="toggleCard('${containerId}',${i})">
        <div class="acard-left">
          <div class="aicon" style="background:${a.cor}22;color:${a.cor}">${a.nome.substring(0,2)}</div>
          <div>
            <div class="acard-name">${pillHtml}${a.nome}</div>
            <div class="acard-qtd">${a.qtd} un · <span class="change-badge ${cc}">${cs}</span></div>
          </div>
        </div>
        <div class="acard-right">
          <div class="acard-saldo">${R(a.saldo)}</div>
          <div class="acard-rend ${r>=0?'pos':'neg'}">${r>=0?'+':'-'}${R(r)} (${pct})</div>
        </div>
      </div>
      <div class="acard-detail" id="det-${containerId}-${i}">
        <div class="detail-row"><span>Custo total</span><span>${R(a.custo)}</span></div>
        <div class="detail-row"><span>Preço médio</span><span>${R(a.custo/a.qtd)}</span></div>
        <div class="detail-row"><span>Preço atual</span><span>${R(a.precoAtual)}</span></div>
        <div class="detail-row"><span>Quantidade</span><span>${a.qtd}</span></div>
        <div class="detail-row"><span>Variação 24h</span><span class="${a.change24h>=0?'pos':'neg'}">${cs}</span></div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id, i) {
  const det = document.getElementById(`det-${id}-${i}`);
  const key = `${id}-${i}`;
  if (openCard && openCard !== key) {
    const [oid, oi] = openCard.split('-').slice(0,2).concat(openCard.split('-').slice(2));
    // close old
    const old = document.querySelector('.acard-detail.open');
    if(old) old.classList.remove('open');
  }
  det.classList.toggle('open');
  openCard = det.classList.contains('open') ? key : null;
}

// ── MAIN RENDER ────────────────────────────────────────────────
function renderAll() {
  const cripto = CRIPTO.map(a => {
    const p = precos[a.nome];
    const precoAtual = p ? p.p : a.custo/a.qtd;
    const saldo = precoAtual * a.qtd;
    return { ...a, tipo:'Cripto', precoAtual, saldo, rend: saldo-a.custo, change24h: p?.c||0 };
  });
  const rv = RV.map(a => {
    const p = precos[a.nome];
    const precoAtual = p ? p.p : a.snap;
    const saldo = precoAtual * a.qtd;
    return { ...a, precoAtual, saldo, rend: saldo-a.custo, change24h: p?.c||0 };
  });
  const todos = [...cripto, ...rv];

  renderSummary(todos);
  renderCharts(todos);
  renderList(cripto, 'list-cripto');
  renderList(rv, 'list-rv');

  document.getElementById('upd-txt').textContent = 'Atualizado: '+new Date().toLocaleTimeString('pt-BR');
  document.getElementById('hdr-sub').textContent = 'Jonilson · '+new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
}

// ── FETCH ALL ──────────────────────────────────────────────────
async function fetchAll() {
  const btn = document.getElementById('rbtn');
  const icon = document.getElementById('rbtn-icon');
  btn.disabled = true;
  icon.className = 'spin'; icon.textContent = '↻';
  document.getElementById('live-txt').textContent = 'atualizando';

  try {
    await Promise.allSettled([fetchCripto(), fetchRV()]);
    document.getElementById('err-box').style.display = 'none';
  } catch {
    document.getElementById('err-box').style.display = 'block';
  }

  renderAll();
  btn.disabled = false;
  icon.className = ''; icon.textContent = '↻';
  document.getElementById('live-txt').textContent = 'ao vivo';
}

// ── INIT ───────────────────────────────────────────────────────
fetchAll();
setInterval(fetchAll, 60000);
</script>
</body>
</html>
